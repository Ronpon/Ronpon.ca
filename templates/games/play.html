{% extends "base.html" %}
{% block title %}{{ game_title }} — Ronpon.com{% endblock %}

{% block head %}
<style>
    .game-frame-container {
        position: relative;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        overflow: hidden;
    }
    .game-frame-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
    }
    .game-frame-header h2 { font-size: 1rem; margin: 0; }
    .game-frame-header a { font-size: 0.85rem; }
    .game-frame {
        width: 100%;
        height: 700px;
        border: none;
        display: block;
        background: #000;
    }
    @media (max-width: 600px) {
        .game-frame { height: 500px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="game-frame-container">
    <div class="game-frame-header">
        <h2>{{ game_title }}</h2>
        <a href="{{ url_for('games.index') }}">&larr; All Games</a>
    </div>
    <iframe class="game-frame"
            src="{{ iframe_src }}"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin allow-popups">
    </iframe>
</div>
{% endblock %}
